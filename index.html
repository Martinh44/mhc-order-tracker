<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MH Customs — Order Tracker</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#f4f4f4;color:#1a1a1a;min-height:100vh}

/* PIN screen */
#pin-screen{position:fixed;inset:0;background:#fff;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
#pin-screen .logo{font-size:22px;font-weight:800;color:#D85A30;letter-spacing:1.5px;text-align:center}
#pin-screen .logo small{display:block;font-size:12px;font-weight:400;color:#999;letter-spacing:0;margin-top:2px}
#pin-input{width:160px;text-align:center;letter-spacing:8px;font-size:22px;font-weight:700;border:none;border-bottom:2px solid #D85A30;padding:8px 4px;background:transparent;color:#1a1a1a;outline:none}
#pin-input::placeholder{letter-spacing:0;font-size:14px;font-weight:400;color:#ccc}
#pin-error{font-size:12px;color:#c62828;height:16px}
#pin-screen.hidden{display:none}

/* Header */
header{background:#fff;border-bottom:2px solid #D85A30;padding:11px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:15px;font-weight:800;color:#D85A30;letter-spacing:1px}
.logo small{display:block;font-size:10px;font-weight:400;color:#999;letter-spacing:0;line-height:1.3}
.header-right{display:flex;align-items:center;gap:10px}
#sync-status{font-size:11px;color:#bbb}
#sync-status.syncing{color:#D85A30}
#sync-status.error{color:#c62828}
#sync-status.ok{color:#2e7d32}
.btn-new{background:#D85A30;color:#fff;border:none;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;border-radius:3px;white-space:nowrap}
.btn-new:hover{background:#c04e27}

/* Board */
.board{display:flex;gap:10px;padding:14px;overflow-x:auto;align-items:flex-start;min-height:calc(100vh - 54px)}

/* Column */
.col{flex:0 0 210px;background:#fff;border-radius:5px;border:1px solid #e0e0e0}
.col-hd{padding:9px 12px;border-bottom:1px solid #ebebeb;display:flex;align-items:center;justify-content:space-between;gap:6px;cursor:default}
.col-hd h2{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#666;flex:1}
.col-ct{background:#D85A30;color:#fff;border-radius:8px;padding:1px 6px;font-size:10px;font-weight:700;flex-shrink:0}
.col-arrow{font-size:10px;color:#bbb;display:none}
.col-bd{padding:8px;min-height:44px}
.col-bd.over{background:#fdf1ee;outline:2px dashed #D85A30;outline-offset:-2px}

/* Card */
.card{background:#fff;border:1px solid #e4e4e4;border-left:3px solid #D85A30;border-radius:3px;padding:9px 10px;margin-bottom:7px;cursor:pointer;user-select:none}
.card:last-child{margin-bottom:0}
.card:hover{border-color:#D85A30}
.card.dragging{opacity:.25}
.c-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.c-id{font-size:12px;font-weight:800;color:#D85A30}
.badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:8px}
.g{background:#e8f5e9;color:#2e7d32}
.am{background:#fff3e0;color:#e65100}
.rd{background:#ffebee;color:#c62828}
.c-stage{font-size:11px;color:#aaa;margin-bottom:2px}
.c-track{font-size:11px;color:#666;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.c-notes{font-size:11px;color:#bbb;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;padding:12px}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:7px;width:100%;max-width:450px;max-height:92vh;overflow-y:auto;padding:22px}
.m-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.m-hd h2{font-size:17px;font-weight:800;color:#D85A30}
.m-x{background:none;border:none;font-size:24px;line-height:1;cursor:pointer;color:#ccc;padding:0}
.m-x:hover{color:#333}
.fl{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#999;margin:14px 0 4px}
.fi,.fta{width:100%;border:1px solid #ddd;border-radius:3px;padding:7px 9px;font-size:14px;font-family:inherit;color:#1a1a1a;background:#fff}
.fi:focus,.fta:focus{outline:none;border-color:#D85A30}
.fta{resize:vertical;min-height:70px}
.s-row{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid #f0f0f0}
.s-row:last-child{border:none}
.s-row input[type=checkbox]{width:15px;height:15px;accent-color:#D85A30;cursor:pointer;flex-shrink:0}
.s-row input:disabled{opacity:.35;cursor:default}
.s-lbl{font-size:13px;color:#222;cursor:pointer;margin:0}
.s-lbl.done{color:#ccc;text-decoration:line-through}
.m-meta{font-size:11px;color:#ccc;margin-top:14px}
.m-acts{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}
.btn-del{background:none;border:1px solid #ddd;color:#bbb;padding:7px 14px;font-size:13px;cursor:pointer;border-radius:3px}
.btn-del:hover{border-color:#c62828;color:#c62828}
.btn-save{background:#D85A30;color:#fff;border:none;padding:7px 18px;font-size:13px;font-weight:700;cursor:pointer;border-radius:3px}
.btn-save:hover{background:#c04e27}

/* Mobile */
@media(max-width:600px){
  .board{flex-direction:column;overflow-x:visible;padding:10px;gap:8px}
  .col{flex:none;width:100%}
  .col-arrow{display:block}
  .col-hd{cursor:pointer}
  .col.open .col-arrow{transform:rotate(90deg)}
  .col-bd:not(.open){display:none}
}
</style>
</head>
<body>

<div id="pin-screen">
  <div class="logo">MH CUSTOMS<small>Order Tracker</small></div>
  <input id="pin-input" type="password" inputmode="numeric" maxlength="6" placeholder="Enter PIN" autocomplete="off">
  <div id="pin-error"></div>
</div>

<header>
  <div class="logo">MH CUSTOMS<small>Order Tracker</small></div>
  <div class="header-right">
    <span id="sync-status"></span>
    <button class="btn-new" onclick="openNew()">+ New Order</button>
  </div>
</header>

<div class="board" id="board"></div>

<div class="overlay" id="overlay" onclick="bgClick(event)">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="m-hd">
      <h2 id="m-title">New Order</h2>
      <button class="m-x" onclick="closeModal()" aria-label="Close">×</button>
    </div>
    <span class="fl">Tracking Number</span>
    <input class="fi" id="f-track" type="text" placeholder="e.g. SF1234567890">
    <span class="fl" style="margin-top:14px">Progress</span>
    <div id="stages-list"></div>
    <span class="fl">Notes</span>
    <textarea class="fta" id="f-notes" placeholder="Any notes…"></textarea>
    <div class="m-meta" id="m-meta"></div>
    <div class="m-acts">
      <button class="btn-del" id="btn-del" onclick="delOrder()">Delete</button>
      <button class="btn-save" onclick="saveOrder()">Save</button>
    </div>
  </div>
</div>

<script>
// ── Config ───────────────────────────────────────────────────────────
const PIN       = '8842';
const GIST_ID   = 'd1dedff261550fdc42f5d900556e87cd';
const GIST_TOK  = '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';
const GIST_FILE = 'orders.json';
const GIST_URL  = `https://api.github.com/gists/${GIST_ID}`;

// ── PIN ──────────────────────────────────────────────────────────────
(function() {
  const ps = document.getElementById('pin-screen');
  const pi = document.getElementById('pin-input');
  const pe = document.getElementById('pin-error');
  if (sessionStorage.getItem('mhc-auth') === '1') { ps.classList.add('hidden'); return; }
  pi.focus();
  pi.addEventListener('input', () => {
    pe.textContent = '';
    if (pi.value.length >= PIN.length) {
      if (pi.value === PIN) { sessionStorage.setItem('mhc-auth', '1'); ps.classList.add('hidden'); }
      else { pe.textContent = 'Incorrect PIN'; pi.value = ''; pi.focus(); }
    }
  });
})();

// ── State ────────────────────────────────────────────────────────────
const SN = ['Order Raised','Invoice Paid','In Production','Shipped','Delivered'];
let orders = JSON.parse(localStorage.getItem('mhc-orders') || '[]');
let cid = null;
let syncTimer = null;

// ── Sync ─────────────────────────────────────────────────────────────
function setStatus(state, msg) {
  const el = document.getElementById('sync-status');
  el.className = state; el.textContent = msg;
}

async function loadFromGist() {
  setStatus('syncing', '↻ syncing…');
  try {
    const r = await fetch(GIST_URL + '?t=' + Date.now(), {
      headers: { Authorization: 'token ' + GIST_TOK, Accept: 'application/vnd.github+json' }
    });
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();
    const raw = data.files[GIST_FILE]?.content || '[]';
    orders = JSON.parse(raw);
    localStorage.setItem('mhc-orders', JSON.stringify(orders));
    setStatus('ok', '✓ synced');
    render();
  } catch (e) {
    setStatus('error', '⚠ offline');
    // fall back to localStorage
    orders = JSON.parse(localStorage.getItem('mhc-orders') || '[]');
    render();
  }
}

async function saveToGist() {
  setStatus('syncing', '↻ saving…');
  try {
    const body = { files: { [GIST_FILE]: { content: JSON.stringify(orders, null, 2) } } };
    const r = await fetch(GIST_URL, {
      method: 'PATCH',
      headers: { Authorization: 'token ' + GIST_TOK, 'Content-Type': 'application/json', Accept: 'application/vnd.github+json' },
      body: JSON.stringify(body)
    });
    if (!r.ok) throw new Error(r.status);
    setStatus('ok', '✓ saved');
  } catch (e) {
    setStatus('error', '⚠ save failed — check connection');
  }
}

function persist() {
  localStorage.setItem('mhc-orders', JSON.stringify(orders));
  clearTimeout(syncTimer);
  syncTimer = setTimeout(saveToGist, 800); // debounce rapid edits
}

// ── Helpers ──────────────────────────────────────────────────────────
function nextId() {
  if (!orders.length) return 'MHC-001';
  const max = Math.max(...orders.map(o => parseInt(o.id.slice(4), 10)));
  return 'MHC-' + String(max + 1).padStart(3, '0');
}
function colOf(o) { let s = 0; for (let i = 0; i < 5; i++) if (o.stages[i]) s = i; return s; }
function daysAgo(ts) { return Math.floor((Date.now() - ts) / 86400000); }
function bCls(d)     { return d < 7 ? 'g' : d < 14 ? 'am' : 'rd'; }
function esc(s)      { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Render ───────────────────────────────────────────────────────────
function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  for (let s = 0; s < 5; s++) {
    const colOrders = orders.filter(o => colOf(o) === s);
    const col = document.createElement('div'); col.className = 'col';
    const hd = document.createElement('div'); hd.className = 'col-hd';
    hd.innerHTML = `<h2>${SN[s]}</h2><span class="col-ct">${colOrders.length}</span><span class="col-arrow">▶</span>`;
    hd.addEventListener('click', () => toggleCol(col, bd));
    const bd = document.createElement('div'); bd.className = 'col-bd'; bd.dataset.stage = s;
    bd.addEventListener('dragover', e => { e.preventDefault(); bd.classList.add('over'); });
    bd.addEventListener('dragleave', e => { if (!bd.contains(e.relatedTarget)) bd.classList.remove('over'); });
    bd.addEventListener('drop', e => {
      e.preventDefault(); bd.classList.remove('over');
      const id = e.dataTransfer.getData('text');
      const o = orders.find(x => x.id === id); if (!o) return;
      for (let i = 0; i <= s; i++) o.stages[i] = true;
      for (let i = s+1; i < 5; i++) o.stages[i] = false;
      o.lastUpdated = Date.now(); persist(); render();
    });
    colOrders.forEach(o => {
      const d = daysAgo(o.lastUpdated);
      const card = document.createElement('div');
      card.className = 'card'; card.draggable = true; card.dataset.id = o.id;
      const fn = (o.notes||'').split('\n')[0].trim();
      card.innerHTML =
        `<div class="c-top"><span class="c-id">${o.id}</span><span class="badge ${bCls(d)}">${d}d</span></div>`+
        `<div class="c-stage">${SN[colOf(o)]}</div>`+
        (o.tracking ? `<div class="c-track">${esc(o.tracking)}</div>` : '')+
        (fn ? `<div class="c-notes">${esc(fn)}</div>` : '');
      card.addEventListener('dragstart', e => { e.dataTransfer.setData('text', o.id); requestAnimationFrame(() => card.classList.add('dragging')); });
      card.addEventListener('dragend', () => card.classList.remove('dragging'));
      card.addEventListener('click', () => openModal(o.id));
      bd.appendChild(card);
    });
    col.appendChild(hd); col.appendChild(bd); board.appendChild(col);
  }
}

function toggleCol(col, bd) {
  if (getComputedStyle(col.querySelector('.col-arrow')).display === 'none') return;
  const open = col.classList.toggle('open'); bd.classList.toggle('open', open);
}

// ── Modal ────────────────────────────────────────────────────────────
function openNew() { openModal(null); }

function openModal(id) {
  cid = id;
  const o = id ? orders.find(x => x.id === id) : null;
  document.getElementById('m-title').textContent = id || 'New Order';
  document.getElementById('f-track').value = o ? (o.tracking||'') : '';
  document.getElementById('f-notes').value = o ? (o.notes||'') : '';
  document.getElementById('btn-del').style.display = id ? '' : 'none';
  const sv = o ? o.stages : [false,false,false,false,false];
  const list = document.getElementById('stages-list'); list.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    const row = document.createElement('div'); row.className = 's-row';
    const cb = document.createElement('input'); cb.type='checkbox'; cb.id='sc'+i;
    cb.checked = sv[i]; cb.disabled = sv.slice(i+1).some(Boolean);
    cb.addEventListener('change', onStage);
    const lbl = document.createElement('label'); lbl.htmlFor='sc'+i;
    lbl.className = 's-lbl'+(sv[i]?' done':''); lbl.textContent = SN[i];
    row.append(cb, lbl); list.appendChild(row);
  }
  document.getElementById('m-meta').textContent = o
    ? `Last updated: ${new Date(o.lastUpdated).toLocaleString()}  ·  ${daysAgo(o.lastUpdated)}d ago` : '';
  document.getElementById('overlay').classList.add('open');
  document.getElementById('f-track').focus();
}

function onStage(e) {
  const i = +e.target.id.slice(2), on = e.target.checked;
  for (let j=0;j<5;j++) { const cb=document.getElementById('sc'+j); if(on&&j<=i) cb.checked=true; if(!on&&j>=i) cb.checked=false; }
  syncLocks();
}
function syncLocks() {
  const v=[0,1,2,3,4].map(i=>document.getElementById('sc'+i).checked);
  for(let i=0;i<5;i++){
    document.getElementById('sc'+i).disabled=v.slice(i+1).some(Boolean);
    const l=document.querySelector(`label[for="sc${i}"]`); if(l) l.className='s-lbl'+(v[i]?' done':'');
  }
}
function closeModal(){ document.getElementById('overlay').classList.remove('open'); cid=null; }
function bgClick(e){ if(e.target===document.getElementById('overlay')) closeModal(); }

function saveOrder() {
  const tracking = document.getElementById('f-track').value.trim();
  const notes = document.getElementById('f-notes').value;
  const stages = [0,1,2,3,4].map(i=>document.getElementById('sc'+i).checked);
  const now = Date.now();
  if (cid) { Object.assign(orders.find(x=>x.id===cid), {tracking,notes,stages,lastUpdated:now}); }
  else { orders.push({id:nextId(),stages,tracking,notes,lastUpdated:now,createdAt:now}); }
  persist(); closeModal(); render();
}

function delOrder() {
  if (!cid||!confirm('Delete '+cid+'?')) return;
  orders=orders.filter(x=>x.id!==cid); persist(); closeModal(); render();
}

// ── Boot ─────────────────────────────────────────────────────────────
render();         // show cached data immediately
loadFromGist();   // then pull latest from cloud
</script>
</body>
</html>
